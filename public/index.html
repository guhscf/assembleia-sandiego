<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <!-- 🔤 Fonte moderna e rápida -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ⚙️ Configurações básicas -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- 🧩 SEO -->
    <title>Assembleia+ San Diego</title>
    <meta
      name="description"
      content="Plataforma digital de assembleias do condomínio San Diego. Participe, vote e acompanhe resultados com segurança."
    />
    <meta name="keywords" content="assembleia, condomínio, votação, san diego, assembleia online" />
    <meta name="author" content="Assembleia+ San Diego" />

    <!-- 📱 Ícones e PWA -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- 🖼️ Open Graph (para compartilhamento em redes sociais) -->
    <meta property="og:title" content="Assembleia+ San Diego" />
    <meta
      property="og:description"
      content="Participe das assembleias do seu condomínio de forma simples e segura."
    />
    <meta property="og:image" content="%PUBLIC_URL%/logo192.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://assembleia-sandiego.com" />

    <!-- ⚡ Performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- 💅 Estilos base -->
    <style>
      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: #f8fafc;
        color: #1f2937;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>

  <body>
    <noscript>Por favor, ative o JavaScript para usar este aplicativo.</noscript>
    <div id="root"></div>
  </body>
</html>
